<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>verl / hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #171717;
      --surface-hover: #1e1e1e;
      --border: #252525;
      --border-hover: #3a3a3a;
      --text: #e2e2e2;
      --text-muted: #666;
      --text-dim: #333;
      --accent: #c8f542;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
    }

    .logo {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--accent);
    }

    .logo span { color: var(--text-dim); }

    header time {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-left: auto;
    }

    main {
      flex: 1;
      padding: 20px 24px 32px;
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .card {
      aspect-ratio: 1 / 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      padding: 14px;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      animation: up 0.35s both;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .card:nth-child(1) { animation-delay: 0.03s }
    .card:nth-child(2) { animation-delay: 0.06s }
    .card:nth-child(3) { animation-delay: 0.09s }
    .card:nth-child(4) { animation-delay: 0.12s }
    .card:nth-child(5) { animation-delay: 0.15s }
    .card:nth-child(6) { animation-delay: 0.18s }
    .card:nth-child(7) { animation-delay: 0.21s }

    @keyframes up {
      from { opacity: 0; transform: translateY(6px) }
      to   { opacity: 1; transform: translateY(0) }
    }

    .card:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
      transform: translateY(-1px);
    }

    .card:active {
      transform: scale(0.97);
      transition-duration: 0.06s;
    }

    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.2s ease;
    }

    .card:hover::after { transform: scaleX(1); }

    .card-icon { font-size: 1.3rem; line-height: 1; }

    .card-name {
      font-family: var(--mono);
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--text);
      display: block;
      margin-bottom: 3px;
    }

    .card-url {
      font-family: var(--mono);
      font-size: 0.56rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 10px 24px;
    }

    footer span {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--text-dim);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">verl<span>·</span>hub</div>
  <time id="clock">--:--</time>
</header>

<main>
  <div class="grid">
    <a class="card" href="https://bearblog.dev/verlanovich/dashboard/" target="_blank" rel="noopener">
      <div class="card-icon">🐻</div>
      <div>
        <span class="card-name">bearblog</span>
        <span class="card-url">bearblog.dev</span>
      </div>
    </a>

    <a class="card" href="https://status.cafe/" target="_blank" rel="noopener">
      <div class="card-icon">☕</div>
      <div>
        <span class="card-name">status.cafe</span>
        <span class="card-url">status.cafe</span>
      </div>
    </a>

    <a class="card" href="https://bookshelf.town/user/verlanovich" target="_blank" rel="noopener">
      <div class="card-icon">📚</div>
      <div>
        <span class="card-name">bookshelf</span>
        <span class="card-url">bookshelf.town</span>
      </div>
    </a>

    <a class="card" href="https://letterboxd.com" target="_blank" rel="noopener">
      <div class="card-icon">🎬</div>
      <div>
        <span class="card-name">letterboxd</span>
        <span class="card-url">letterboxd.com</span>
      </div>
    </a>

    <a class="card" href="https://neocities.org/dashboard" target="_blank" rel="noopener">
      <div class="card-icon">🏡</div>
      <div>
        <span class="card-name">neocities</span>
        <span class="card-url">neocities.org</span>
      </div>
    </a>

    <a class="card" href="https://nekoweb.org/dashboard/?path=/verlanovich.nekoweb.org&site=verlanovich" target="_blank" rel="noopener">
      <div class="card-icon">🐱</div>
      <div>
        <span class="card-name">nekoweb</span>
        <span class="card-url">nekoweb.org</span>
      </div>
    </a>

    <a class="card" href="https://nikki.top/index.php" target="_blank" rel="noopener">
      <div class="card-icon">📔</div>
      <div>
        <span class="card-name">nikki</span>
        <span class="card-url">nikki.top</span>
      </div>
    </a>
  </div>
</main>

<footer>
  <span>7 platforms</span>
</footer>

<script>
  const tick = () => {
    const n = new Date();
    document.getElementById('clock').textContent =
      String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  };
  tick();
  setInterval(tick, 30000);
</script>
</body>
</html>
